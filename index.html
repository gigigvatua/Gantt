<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ავეჯის საწარმოს Gantt ცხრილი (ონლაინ, Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#EDEAE0;
  --panel:#FFFFFF;
  --ink:#211E1A;
  --ink-soft:#6B665C;
  --line:#DCD6C8;
  --line-soft:#EAE6DA;
  --blueprint:#2E4A5C;
  --mdf:#C99B5E;
  --mdf-dark:#A87D45;
  --rust:#B5502F;
  --sage:#5C7A6B;
  --stone:#9B968C;
  --danger:#B5502F;
  --radius:8px;
  --sidebar-w:440px;
  --day-w:30px;
}
html{height:100%;}
*{box-sizing:border-box;}
body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{
  max-width:100%;
  margin:0 auto;
  padding:20px 24px 20px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ---- Header ---- */
.topbar{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:22px;flex-wrap:wrap;gap:16px;
}
.brand{display:flex;align-items:center;gap:16px;}
.logo-img{
  height:58px;width:auto;border-radius:14px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.title-block h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;font-weight:700;margin:0 0 4px;
  letter-spacing:-.01em;
}
.title-block p{margin:0;color:var(--ink-soft);font-size:13.5px;}
.title-block .tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--blueprint);color:#fff;padding:2px 8px;border-radius:3px;
  letter-spacing:.03em;margin-bottom:8px;
}
.btn{
  font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
  border:none;border-radius:6px;padding:10px 16px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:transform .1s, box-shadow .15s;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--blueprint);color:#fff;}
.btn-primary:hover{box-shadow:0 3px 10px rgba(46,74,92,.35);}
.btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--ink-soft);}
.btn-icon{
  width:28px;height:28px;padding:0;border-radius:5px;border:1px solid var(--line);
  background:var(--panel);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
}
.btn-icon:hover{background:var(--line-soft);}
.btn-icon.danger:hover{background:#f5e3dd;border-color:var(--rust);}

/* ---- Stats ---- */
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}

/* ---- View tabs ---- */
.view-tabs{display:flex;gap:8px;margin-bottom:14px;}
.view-tab{
  font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
  padding:9px 18px;border-radius:7px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink-soft);cursor:pointer;transition:all .12s;
}
.view-tab:hover{border-color:var(--ink-soft);color:var(--ink);}
.view-tab.active{background:var(--blueprint);color:#fff;border-color:var(--blueprint);}
.stat-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 16px;min-width:110px;
}
.stat-card .num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;}
.stat-card .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}

/* ---- Toolbar ---- */
.toolbar{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  margin-bottom:12px;flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--panel);
  border:1px solid var(--line);border-radius:6px;padding:7px 12px;min-width:240px;
}
.search-box input{
  border:none;outline:none;font-family:'Inter',sans-serif;font-size:13.5px;
  width:100%;background:transparent;color:var(--ink);
}
.search-box svg{flex-shrink:0;opacity:.5;}

/* ---- Gantt wrap ---- */
.gantt-wrap{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:auto;position:relative;
  flex:1 1 auto;min-height:0;
}
.gantt-inner{position:relative;width:max-content;min-width:100%;}

.row{display:flex;border-bottom:1px solid var(--line-soft);}
.row:last-child{border-bottom:none;}

.side{
  position:sticky;left:0;z-index:3;width:var(--sidebar-w);flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--line);
  display:flex;align-items:center;gap:8px;padding:0 10px;
}
.side.head{z-index:6;}

.timeline{position:relative;flex-shrink:0;}

/* header */
.head-row{position:sticky;top:0;z-index:4;background:var(--panel);}
.ruler{position:relative;}
.ruler-months{display:flex;height:24px;border-bottom:1px solid var(--line);}
.ruler-month{
  flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);
  display:flex;align-items:center;padding-left:6px;border-right:1px dashed var(--line);
  letter-spacing:.02em;
}
.ruler-days{display:flex;height:26px;}
.ruler-day{
  flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line-soft);
  position:relative;
}
.ruler-day::before{
  content:"";position:absolute;top:0;left:50%;width:1px;height:4px;background:var(--line);
}
.ruler-day.weekend{background:var(--line-soft);}
.ruler-day.today{background:#f2ded3;color:var(--rust);font-weight:700;}

/* order / task rows */
.order-row .side{height:52px;background:#fbfaf6;}
.task-row .side{height:40px;}
.order-row .timeline{height:52px;}
.task-row .timeline{height:40px;}

.chev{
  width:20px;height:20px;flex-shrink:0;border:none;background:transparent;cursor:pointer;
  color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:transform .15s;
}
.chev.collapsed{transform:rotate(-90deg);}
.chev svg{width:14px;height:14px;}

.name-block{flex:1;min-width:0;}
.name-block .nm{
  font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.name-block .sub{
  font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-row .name-block .nm{font-weight:500;font-size:12.5px;}

.name-block .nm .note-dot{font-size:10.5px;cursor:help;}
.badge{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
  padding:3px 9px;border-radius:4px;color:#fff;white-space:nowrap;letter-spacing:.02em;
  box-shadow:0 1px 2px rgba(0,0,0,.25);
}
.row-actions{display:flex;gap:4px;flex-shrink:0;}

/* bars */
.bar{
  position:absolute;top:9px;border-radius:5px;overflow:hidden;cursor:pointer;
  box-shadow:0 2px 4px rgba(0,0,0,.28);border:1px solid rgba(0,0,0,.22);
  min-width:6px;transition:filter .1s;
}
.order-row .bar{height:34px;}
.task-row .bar{height:22px;top:9px;}
.bar:hover{filter:brightness(1.06);}
.bar .edge{position:absolute;top:0;left:0;right:0;height:5px;}
.bar .lbl{
  position:absolute;inset:5px 6px 0;font-size:11.5px;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 3px rgba(0,0,0,.8), 0 0 6px rgba(0,0,0,.4);
  letter-spacing:.01em;
}
.task-row .bar .lbl{font-size:10.5px;inset:4px 5px 0;}

.today-line{
  position:absolute;top:0;width:0;border-left:2px dashed var(--rust);z-index:2;pointer-events:none;
}
.today-tag{
  position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;color:#fff;
  background:var(--rust);padding:1px 5px;border-radius:3px;top:52px;transform:translateX(-50%);white-space:nowrap;
}

.empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.empty-state svg{opacity:.35;margin-bottom:10px;}

/* ---- Login screen ---- */
#loginScreen{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
#loginScreen.hidden{display:none;}
.login-card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  width:100%;max-width:380px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.12);
}
.login-card h1{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:0 0 6px;}
.login-card p{color:var(--ink-soft);font-size:13px;margin:0 0 22px;}
.login-card .field{margin-bottom:14px;}
.login-card .field label{
  display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.03em;
}
.login-card input{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:#fff;
}
.login-card input:focus{outline:none;border-color:var(--blueprint);}
.login-card .btn{width:100%;justify-content:center;padding:11px;margin-top:6px;}
.login-err{color:var(--rust);font-size:12.5px;margin-top:10px;display:none;}
.login-toggle{
  text-align:center;font-size:12.5px;color:var(--ink-soft);margin-top:16px;
}
.login-toggle a{color:var(--blueprint);cursor:pointer;font-weight:600;text-decoration:none;}

/* ---- User / role badge in topbar ---- */
.user-badge{
  display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-soft);
}
.user-badge .role-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:4px;color:#fff;letter-spacing:.02em;
}

/* ---- Modal ---- */
.overlay{
  position:fixed;inset:0;background:rgba(33,30,26,.5);display:none;
  align-items:center;justify-content:center;z-index:50;padding:20px;
}
.overlay.open{display:flex;}
.modal{
  background:var(--panel);border-radius:10px;width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
}
.modal-head h3{margin:0;font-family:'Space Grotesk',sans-serif;font-size:17px;}
.modal-body{padding:20px 22px;}
.field{margin-bottom:15px;}
.field label{
  display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.03em;
}
.field input[type=text],.field select,.field input[type=date],.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink);background:#fff;
}
.field textarea{resize:vertical;min-height:60px;font-family:'Inter',sans-serif;}
.field input[type=text]:focus,.field select:focus,.field input[type=date]:focus,.field textarea:focus{
  outline:none;border-color:var(--blueprint);
}
.row2{display:flex;gap:12px;}
.row2 .field{flex:1;}
.color-row{display:flex;align-items:flex-start;gap:10px;}
.color-row input[type=color]{
  width:44px;height:34px;border:1px solid var(--line);border-radius:6px;padding:2px;cursor:pointer;background:#fff;
}
.swatches{display:flex;gap:6px;flex-wrap:wrap;max-width:230px;}
.swatch{
  width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;
}
.swatch.active{border-color:var(--ink);}
.err{color:var(--rust);font-size:12px;margin-top:4px;display:none;}
.modal-foot{
  padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:-8px;margin-bottom:14px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>ავეჯის Gantt ცხრილი</h1>
    <p id="loginSubtitle">გაიარეთ ავტორიზაცია სამუშაოდ გასაგრძელებლად</p>
    <div class="field">
      <label>ელფოსტა</label>
      <input type="text" id="loginEmail" placeholder="name@company.com" autocomplete="username">
    </div>
    <div class="field">
      <label>პაროლი</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btnLoginSubmit">შესვლა</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-toggle">
      ანგარიში არ გაქვთ? <a id="toggleSignup">დარეგისტრირდით</a>
    </div>
  </div>
</div>

/* ---------- Data layer (shared Postgres tables via Supabase) ---------- */
function rowToOrder(o){
  return {
    id:o.id, name:o.name, client:o.client||'', start:o.start_date, end:o.end_date,
    color:o.color, status:o.status, responsible:o.responsible||'', notes:o.notes||'', tasks:[]
  };
}
function rowToTask(t){
  return {
    id:t.id, title:t.title||'', stage:t.stage, start:t.start_date, end:t.end_date,
    color:t.color, status:t.status, employee:t.employee||'', notes:t.notes||''
  };
}

async function loadData(){
  updateStatusText('იტვირთება...');
  try{
    const [{ data: orderRows, error: oErr }, { data: taskRows, error: tErr }] = await Promise.all([
      sb.from('orders').select('*').order('created_at', { ascending:true }),
      sb.from('tasks').select('*').order('created_at', { ascending:true })
    ]);
    if(oErr) throw oErr;
    if(tErr) throw tErr;

    const byId = {};
    orders = orderRows.map(o=>{ const ord = rowToOrder(o); byId[ord.id] = ord; return ord; });
    taskRows.forEach(t=>{ const ord = byId[t.order_id]; if(ord) ord.tasks.push(rowToTask(t)); });

    orders.forEach(o=>{ if(expanded[o.id] === undefined) expanded[o.id] = true; });
    updateStatusText(`დაკავშირებულია (${orders.length} შეკვეთა)`);
    render();
  }catch(e){
    console.error(e);
    updateStatusText('მონაცემების ჩატვირთვა ვერ მოხერხდა: ' + (e.message||''));
  }
}

function subscribeRealtime(){
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('gantt-live')
    .on('postgres_changes', { event:'*', schema:'public', table:'orders' }, ()=> loadData())
    .on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, ()=> loadData())
    .subscribe();
}

/* ---------- computed range ---------- */
function computeRange(){
  const t = todayLocal();
  let dataMin=null, dataMax=null;
  orders.forEach(o=>{
    [o, ...o.tasks].forEach(item=>{
      const s = parseISO(item.start), e = parseISO(item.end);
      if(!dataMin || s<dataMin) dataMin=s;
      if(!dataMax || e>dataMax) dataMax=e;
    });
  });
  const paddedDataMin = dataMin ? addDays(dataMin,-3) : null;
  const paddedDataMax = dataMax ? addDays(dataMax,7) : null;
  const defaultMin = addDays(t,-30); /* always allow scrolling ~1 month into the past */
  const defaultMax = addDays(t,45);  /* always allow scrolling well into the future */
  const min = (paddedDataMin && paddedDataMin < defaultMin) ? paddedDataMin : defaultMin;
  const max = (paddedDataMax && paddedDataMax > defaultMax) ? paddedDataMax : defaultMax;
  return {start:min, end:max, days:diffDays(min,max)+1};
}

/* ---------- render ---------- */
let _isFirstRender = true;
function render(){
  renderStats();
  const inner = document.getElementById('ganttInner');
  const wrap = document.querySelector('.gantt-wrap');
  const prevScrollLeft = wrap ? wrap.scrollLeft : null;
  const prevScrollTop = wrap ? wrap.scrollTop : null;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = orders.filter(o=>{
    const matchesQuery = !query || o.name.toLowerCase().includes(query) || o.client.toLowerCase().includes(query);
    const matchesView = currentView === 'completed' ? o.status === 'დასრულებული' : o.status !== 'დასრულებული';
    return matchesQuery && matchesView;
  });

  const range = computeRange();
  const dayW = 30;
  const totalW = range.days * dayW;
  const t = todayLocal();

  let html = '';

  // header
  const headerLabel = stageFilter === 'all' ? 'შეკვეთის ჩამონათვალი' : `ეტაპი: ${escapeHtml(stageFilter)}`;
  html += `<div class="row head-row"><div class="side head">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;">${headerLabel}</div>
    </div><div class="timeline ruler" style="width:${totalW}px">
      ${renderMonths(range, dayW)}
      ${renderDays(range, dayW, t)}
    </div></div>`;

  let rowsHtml = '';
  let rowCount = 0;
  if(stageFilter === 'all'){
    filtered.forEach(o=>{
      rowsHtml += renderOrderRow(o, range, dayW);
      rowCount++;
      if(expanded[o.id]){
        o.tasks.forEach(task=>{ rowsHtml += renderTaskRow(o, task, range, dayW); rowCount++; });
      }
    });
  } else {
    filtered.forEach(o=>{
      o.tasks.filter(task=> task.stage === stageFilter).forEach(task=>{
        rowsHtml += renderFlatTaskRow(o, task, range, dayW);
        rowCount++;
      });
    });
  }

  if(rowCount === 0){
    let emptyMsg;
    if(query) emptyMsg = 'შედეგი ვერ მოიძებნა';
    else if(stageFilter !== 'all') emptyMsg = `"${stageFilter}" ეტაპი ჯერ არცერთ შეკვეთაში არ არის დამატებული`;
    else emptyMsg = (currentView === 'completed' ? 'დასრულებული პროექტი ჯერ არ არის' : 'მიმდინარე შეკვეთა არ არის');
    html += `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v3M16 4v3"/></svg>
      <div>${emptyMsg}</div>
    </div>`;
  } else {
    html += rowsHtml;
  }

  // today line + tag, appended once, positioned across full content
  const todayX = diffDays(range.start, t) * dayW;
  inner.innerHTML = html;
  inner.style.position = 'relative';

  const line = document.createElement('div');
  line.className = 'today-line';
  line.style.left = (440 + todayX) + 'px';
  line.style.height = inner.scrollHeight + 'px';
  inner.appendChild(line);

  const tag = document.createElement('div');
  tag.className='today-tag';
  tag.textContent='დღეს';
  tag.style.left = (440 + todayX) + 'px';
  inner.appendChild(tag);

  attachRowEvents();

  if(wrap){
    if(_isFirstRender){
      /* open the view centered near today, leaving room to scroll back into the past */
      wrap.scrollLeft = Math.max(0, todayX - 220);
      _isFirstRender = false;
    } else if(prevScrollLeft !== null){
      /* keep the user's current scroll position after edits, instead of jumping back */
      wrap.scrollLeft = prevScrollLeft;
      wrap.scrollTop = prevScrollTop;
    }
  }
}

function renderMonths(range, dayW){
  let html='', cursor=new Date(range.start), remaining=range.days;
  while(remaining>0){
    const monthEnd = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
    const daysInSpan = Math.min(diffDays(cursor, monthEnd), remaining);
    html += `<div class="ruler-month" style="width:${daysInSpan*dayW}px">${MONTHS_KA[cursor.getMonth()]} ${cursor.getFullYear()}</div>`;
    cursor = monthEnd; remaining -= daysInSpan;
  }
  return `<div class="ruler-months">${html}</div>`;
}
function renderDays(range, dayW, t){
  let html='';
  for(let i=0;i<range.days;i++){
    const d = addDays(range.start, i);
    const isWeekend = d.getDay()===0 || d.getDay()===6;
    const isToday = diffDays(d,t)===0;
    html += `<div class="ruler-day ${isWeekend?'weekend':''} ${isToday?'today':''}" style="width:${dayW}px">${d.getDate()}</div>`;
  }
  return `<div class="ruler-days">${html}</div>`;
}

function barPos(item, range, dayW){
  const s = parseISO(item.start), e = parseISO(item.end);
  const left = diffDays(range.start, s) * dayW;
  const width = Math.max((diffDays(s,e)+1) * dayW - 4, 8);
  return {left, width};
}

function attachRowEvents(){
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = ()=>{ const id=el.getAttribute('data-toggle'); expanded[id]=!expanded[id]; render(); };
  });
  document.querySelectorAll('[data-add-task]').forEach(el=>{
    el.onclick = ()=> openTaskModal(el.getAttribute('data-add-task'), null);
  });
  document.querySelectorAll('[data-edit-order]').forEach(el=>{
    el.onclick = ()=>{ if(canEdit()) openOrderModal(el.getAttribute('data-edit-order')); };
  });
  document.querySelectorAll('[data-del-order]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); deleteOrder(el.getAttribute('data-del-order')); };
  });
  document.querySelectorAll('[data-edit-task]').forEach(el=>{
    el.onclick = ()=>{ if(!canEdit()) return; const [oId,tId]=el.getAttribute('data-edit-task').split('|'); openTaskModal(oId, tId); };
  });
  document.querySelectorAll('[data-del-task]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); const [oId,tId]=el.getAttribute('data-del-task').split('|'); deleteTask(oId,tId); };
  });
  document.querySelectorAll('[data-own-status]').forEach(el=>{
    el.onclick = (e)=> e.stopPropagation();
    el.onchange = (e)=>{ e.stopPropagation(); submitOwnStatus(el.getAttribute('data-own-status'), el.value); };
  });
}

/* ---------- mutations ---------- */
async function deleteOrder(id){
  if(!isAdmin()){ alert('შეკვეთის წაშლის უფლება მხოლოდ ადმინს აქვს.'); return; }
  if(!confirm('წავშალო შეკვეთა და მისი ყველა ეტაპი?')) return;
  try{
    await deleteOrderRemote(id);
    await loadData();
  }catch(e){ alert('წაშლა ვერ მოხერხდა: ' + (e.message||'')); }
}
async function deleteTask(oId,tId){
  if(!canEdit()){ alert('ეტაპის წაშლის უფლება არ გაქვთ.'); return; }
  if(!confirm('წავშალო ეს ეტაპი?')) return;
  try{
    await deleteTaskRemote(tId);
    await loadData();
  }catch(e){ alert('წაშლა ვერ მოხერხდა: ' + (e.message||'')); }
}

async function submitOwnStatus(taskId, newStatus){
  try{
    await updateOwnTaskStatus(taskId, newStatus);
    await loadData();
  }catch(e){ alert('სტატუსის განახლება ვერ მოხერხდა: ' + (e.message||'')); }
}

      </div>

        </div>

        <textarea id="fNotes" placeholder="დამატებითი დეტალები, სპეციალური მოთხოვნები და ა.შ.">${escapeHtml(data.notes||'')}</textarea>

    const end = document.getElementById('fEnd').value;

    if(!name){ document.getElementById('errName').style.display='block'; ok=false; } else document.getElementById('errName').style.display='none';

function openTaskModal(orderId, existingTaskId){
  if(!canEdit()) return;
  const order = orders.find(o=>o.id===orderId);
  if(!order) return;
  const existing = existingTaskId ? order.tasks.find(t=>t.id===existingTaskId) : null;
  const t = todayLocal();
  const data = existing || {
    title:'', stage: STAGES[0], start: toISO(t), end: toISO(addDays(t,3)),
    color:'#C99B5E', status:TASK_STATUSES[0], employee: STAGE_DEFAULT_EMPLOYEE[0], notes:''
  };
  const stageOptions = STAGES.map(s=>s).concat(['სხვა (ხელით შეყვანა)']);

  modalContent.innerHTML = `
    <div class="modal-head"><h3>${existing?'ეტაპის რედაქტირება':'ახალი ეტაპი'}</h3>
      <button class="btn-icon" id="mClose"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="hint">შეკვეთა: ${escapeHtml(order.name)}</div>

        <div class="hint" style="margin-top:6px;margin-bottom:0;">თუ ცარიელი დარჩება, ჩამონათვალში აჩვენებს ქვემოთ არჩეულ ეტაპის კატეგორიას</div>
      </div>
      <div class="field"><label>ეტაპის კატეგორია</label>
        <select id="fStage">${opt(stageOptions, isCustomStage ? 'სხვა (ხელით შეყვანა)' : data.stage)}</select>
      </div>
      <div class="field" id="customStageWrap" style="display:${isCustomStage?'block':'none'}">
        <label>კატეგორიის სახელი (ხელით)</label>
        <input type="text" id="fStageCustom" value="${escapeHtml(isCustomStage?existing.stage:'')}" placeholder="კატეგორიის სახელი">
      </div>
      <div class="row2">
        <div class="field"><label>დაწყების თარიღი</label><input type="date" id="fStart" value="${data.start}"></div>
        <div class="field"><label>დასრულების თარიღი</label><input type="date" id="fEnd" value="${data.end}"></div>
      </div>
      <div class="err" id="errDate">დასრულების თარიღი უნდა იყოს დაწყების შემდეგ</div>
      <div class="row2">
        <div class="field"><label>სტატუსი</label><select id="fStatus">${opt(TASK_STATUSES, data.status)}</select></div>
        <div class="field"><label>პასუხისმგებელი</label><select id="fEmployee">${opt(EMPLOYEES, data.employee)}</select></div>
      </div>
      <div class="field"><label>ფერი</label>
        <div class="color-row">
          <input type="color" id="fColor" value="${data.color}">
          <div class="swatches" id="swatches"></div>
        </div>
      </div>
      <div class="field"><label>შენიშვნა</label>
        <textarea id="fNotes" placeholder="დამატებითი დეტალები ამ ეტაპთან დაკავშირებით">${escapeHtml(data.notes||'')}</textarea>

      <button class="btn btn-primary" id="mSave">${existing?'შენახვა':'დამატება'}</button>
    </div>
  `;
  overlay.classList.add('open');
  buildSwatches(document.getElementById('fColor'));

  const stageSel = document.getElementById('fStage');
  stageSel.onchange = ()=>{
    const val = stageSel.value;
    document.getElementById('customStageWrap').style.display = (val==='სხვა (ხელით შეყვანა)') ? 'block' : 'none';
    if(!existing){
      const idx = STAGES.indexOf(val);
      if(idx>-1) document.getElementById('fEmployee').value = STAGE_DEFAULT_EMPLOYEE[idx];

    const titleVal = document.getElementById('fTitle').value.trim() || stageVal;
    const payload = {
      title: titleVal, stage: stageVal, start, end,
      color: document.getElementById('fColor').value,
      status: document.getElementById('fStatus').value,
      employee: document.getElementById('fEmployee').value,
      notes: document.getElementById('fNotes').value.trim()

    btn.disabled = true; btn.textContent = 'ინახება...';
    try{
      await saveTask(order.id, payload, existing ? existing.id : null);
      expanded[order.id] = true;
      await loadData();
      closeModal();
    }catch(e){
      alert('შენახვა ვერ მოხერხდა: ' + (e.message||''));
      btn.disabled = false; btn.textContent = existing?'შენახვა':'დამატება';
    }
  };
}

function buildSwatches(colorInput){
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = SWATCHES.map(c=>`<div class="swatch ${c.toLowerCase()===colorInput.value.toLowerCase()?'active':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  wrap.querySelectorAll('.swatch').forEach(sw=>{
    sw.onclick = ()=>{
      colorInput.value = sw.getAttribute('data-c');
      wrap.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
    };
  });
}

/* ---------- admin-only backup export ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(orders, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gantt-shekvetebi-${toISO(todayLocal())}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
document.getElementById('btnExport').onclick = exportData;

function populateStageFilter(){
  const sel = document.getElementById('stageFilterSelect');
  sel.innerHTML = '<option value="all">ყველა ეტაპი</option>' +
    STAGES.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  sel.onchange = ()=>{
    stageFilter = sel.value;
    _isFirstRender = true;
    render();
  };
}

initAuth();
